<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SnapSort: Vanilla JS</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&icon_names=arrow_left_alt,arrow_right_alt,delete&display=block"
    />
    <link rel="stylesheet" href="demo.css" />
  </head>

  <body>
    <script type="module" src="demo.mjs" defer></script>

    <main class="components-demo">
      <header class="demo-header">
        <div>
          <h1>SnapSort Vanilla</h1>
          <p><span id="item-count">0</span> Euclidean cards backed by plain DOM and JS state</p>
        </div>
      </header>

      <section class="algorithm-panel kanban-panel">
        <div class="section-heading">
          <h2>Euclidean drag and drop</h2>
          <p>Vanilla JS board with column moves, item deletion, and drag reordering.</p>
        </div>

        <div class="kanban-demo-shell">
          <div class="toolbar">
            <button id="add-item-button" type="button">Add Item</button>
            <button id="reset-button" type="button">Reset</button>
          </div>

          <div class="engine-area">
            <div id="vanilla-snapsort-canvas" class="engine-canvas">
              <div class="board-frame">
                <div
                  id="vanilla-board"
                  class="snapsort-container snapsort-container-euclidean board"
                  aria-label="SnapSort vanilla Kanban board"
                ></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>

name: Publish to npm

on:
  push:
    tags:
      - 'core-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Verify release commit is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Verify tag matches package version
        run: |
          package_version=$(node -p "require('./package.json').version")
          tag_version="${GITHUB_REF_NAME#core-v}"

          if [ "$package_version" != "$tag_version" ]; then
            echo "Tag version core-v$tag_version does not match package.json version $package_version"
            exit 1
          fi

      - name: Prepare root package install
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const packageJsonPath = "package.json";
          const packageLockPath = "package-lock.json";

          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
          delete packageJson.workspaces;
          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);

          const packageLock = JSON.parse(fs.readFileSync(packageLockPath, "utf8"));
          delete packageLock.packages[""].workspaces;

          for (const packagePath of Object.keys(packageLock.packages)) {
            if (
              packagePath.startsWith("assets/") ||
              packagePath.startsWith("node_modules/@snap-engine/")
            ) {
              delete packageLock.packages[packagePath];
            }
          }

          fs.writeFileSync(packageLockPath, `${JSON.stringify(packageLock, null, 2)}\n`);
          NODE

      - run: npm ci
      - run: npm run validate:packages
      - run: npm run build
      - run: npm publish --access public --provenance
      - name: Verify published registry version
        run: |
          package_version=$(node -p "require('./package.json').version")
          for attempt in 1 2 3 4 5 6; do
            published_version=$(npm view "@snap-engine/core@$package_version" version 2>/dev/null || true)
            if [ "$published_version" = "$package_version" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "Registry did not return @snap-engine/core@$package_version"
          exit 1

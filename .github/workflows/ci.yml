name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run validate:packages
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run check:adapters
      - run: npm run check:website
      - run: npm run build
